<!DOCTYPE html>
<!--
  anvil/lib/memo/template.html

  Pandoc HTML template for the anvil:memo PDF render chain. Consumed via:

    pandoc memo.md \
      --template anvil/lib/memo/template.html \
      --css anvil/lib/memo/styles.css \
      --metadata title="..." \
      --metadata author="..." \
      --metadata date="..." \
      -o memo.html

  The resulting HTML is then fed to the HTML-to-PDF engine (weasyprint
  or wkhtmltopdf — see anvil/lib/memo/README.md for the engine selection
  order and pinning rationale).

  Pandoc variables consumed:
    $title$    — memo title (from YAML frontmatter or --metadata title=)
    $author$   — memo author (from YAML frontmatter or --metadata author=)
    $date$     — memo date (from YAML frontmatter or --metadata date=)
    $body$     — rendered memo body
    $lang$     — document language (defaults to "en")
    $css$      — stylesheet path(s) from the pandoc --css flag; emitted as
                 <link rel="stylesheet"> tags. render_gate.py passes the
                 absolute path to styles.css here (issue #470).

  All four are optional; the template degrades to "untitled" / hidden
  author/date rows when the values are absent. This matches the
  reality of in-progress memos where the YAML block may not be complete.
-->
<html lang="$if(lang)$$lang$$else$en$endif$" xml:lang="$if(lang)$$lang$$else$en$endif$">
<head>
  <meta charset="utf-8" />
  <meta name="generator" content="pandoc + anvil/lib/memo" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>$if(title)$$title$$else$Untitled Memo$endif$</title>
$for(css)$
  <link rel="stylesheet" href="$css$" />
$endfor$
$for(header-includes)$
  $header-includes$
$endfor$
</head>
<body>
$if(title)$
<div class="title-block">
  <div class="title">$title$</div>
$if(author)$
  <div class="author">$author$</div>
$endif$
$if(date)$
  <div class="date">$date$</div>
$endif$
</div>
$endif$

$body$
</body>
</html>
